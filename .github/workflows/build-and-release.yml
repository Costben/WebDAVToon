name: Android Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch: # 允许手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build and Publish
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 安装 Rust 工具链和 Android 交叉编译目标
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      # 缓存 Cargo 依赖以加快速度
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            rust-core/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-core/Cargo.lock') }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 编译 APK (如果是 Tag 推送，编译 Release 版)
      - name: Build APK
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973 # GitHub Actions 默认自带的一个 NDK 版本
        run: |
          if [ "${{ startsWith(github.ref, 'refs/tags/v') }}" = "true" ]; then
            echo "Building Release APK..."
            # 将 Secrets 里的 Base64 还原为密钥文件
            echo "${{ secrets.SIGNING_KEY }}" | base64 -d > app/release.jks
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=$(pwd)/app/release.jks \
              -Pandroid.injected.signing.store.password=${{ secrets.KEY_STORE_PASSWORD }} \
              -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
              -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
          else
            echo "Building Debug APK..."
            ./gradlew assembleDebug
          fi

      # 上传编译产物到 Artifacts (非 Tag 推送时)
      - name: Upload APK Artifact
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: WebDAVToon-Debug-APK
          path: app/build/outputs/apk/debug/*.apk

      # 推送 Tag 时自动发布 Release
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
