name: Android Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  NDK_VERSION: '26.3.11579264'

jobs:
  build:
    name: Build and Publish
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            rust-core/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-core/Cargo.lock', 'rust-core/src/**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Android NDK
        run: |
          yes | sdkmanager --licenses > /dev/null
          sdkmanager --install "ndk;${NDK_VERSION}"

      - name: Set up Environment
        run: |
          # Link python -> python3 for rust-android-gradle.
          sudo ln -sf /usr/bin/python3 /usr/bin/python

          # GitHub runners may expose either ANDROID_HOME or ANDROID_SDK_ROOT.
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          NDK_PATH="${SDK_ROOT}/ndk/${NDK_VERSION}"

          echo "Using SDK root: $SDK_ROOT"
          echo "Using NDK version: $NDK_VERSION"

          {
            echo "ANDROID_HOME=$SDK_ROOT"
            echo "ANDROID_SDK_ROOT=$SDK_ROOT"
            echo "ANDROID_NDK_HOME=$NDK_PATH"
          } >> "$GITHUB_ENV"

          printf "sdk.dir=%s\nndk.dir=%s\n" "$SDK_ROOT" "$NDK_PATH" > local.properties

      - name: Verify NDK Path
        run: |
          if [ ! -d "$ANDROID_NDK_HOME" ]; then
            echo "::error::NDK directory not found at $ANDROID_NDK_HOME"
            exit 1
          else
            echo "NDK found at $ANDROID_NDK_HOME"
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: |
          # Explicit export in case a plugin does not read $GITHUB_ENV.
          export ANDROID_NDK_HOME=$ANDROID_NDK_HOME
          echo "Using NDK path: $ANDROID_NDK_HOME"

          if [ "${{ startsWith(github.ref, 'refs/tags/v') }}" = "true" ]; then
            echo "Building Release APK..."
            echo "${{ secrets.SIGNING_KEY }}" | base64 -d > app/release.jks
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=$(pwd)/app/release.jks \
              -Pandroid.injected.signing.store.password=${{ secrets.KEY_STORE_PASSWORD }} \
              -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
              -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
              --stacktrace
          else
            echo "Building Debug APK..."
            ./gradlew assembleDebug --stacktrace
          fi

      - name: Upload APK Artifact
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: WebDAVToon-Debug-APK
          path: app/build/outputs/apk/debug/*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
